# -----------------------------------------------------------------------------
# docker-compose.yml
#
# Phase 3 (Docker & Container Infrastructure) stood up the DATA-LAYER
# containers: PostgreSQL, Redis, Qdrant, MinIO.
#
# Phase 4 (Backend Foundation) adds the `gateway` service (FastAPI). No other
# application containers (agents, SLM server) are defined here yet; those
# are wired in starting Phase 7 and Phase 15 respectively.
#
# Run from the REPOSITORY ROOT (so the .env file and bind-mount paths below
# resolve correctly):
#
#   docker compose --env-file .env -f docker/docker-compose.yml up -d
#
# -----------------------------------------------------------------------------

networks:
  ai-review-network:
    name: ai-review-network
    driver: bridge

services:

  postgres:
    image: postgres:16-alpine
    container_name: ai-review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_review}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-ai_review}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks:
      - ai-review-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_review} -d ${POSTGRES_DB:-ai_review}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ai-review-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme_dev_only}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./volumes/redis:/data
    networks:
      - ai-review-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-changeme_dev_only} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: ai-review-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    networks:
      - ai-review-network
    healthcheck:
      # The qdrant/qdrant image does not ship curl/wget, so we use a plain
      # bash TCP probe against the HTTP port rather than an HTTP-level check.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: ai-review-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ai_review_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_dev_only}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./volumes/minio:/data
    networks:
      - ai-review-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Phase 4: Backend Foundation -----------------------------------------
  # The FastAPI API Gateway. At this phase it does not yet connect to any of
  # the data-layer services above (no DB/queue/vector-store wiring exists
  # until later phases) — it only needs to share the same Docker network so
  # that wiring can be added without touching this service definition.
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    container_name: ai-review-gateway
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-ai-code-review-framework}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GATEWAY_HOST: ${GATEWAY_HOST:-0.0.0.0}
      GATEWAY_PORT: ${GATEWAY_PORT:-8000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    networks:
      - ai-review-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# -----------------------------------------------------------------------------
# Notes:
# - All four data-layer services use LOCAL BIND MOUNTS under
#   docker/volumes/<service>/ so data is easy to inspect/reset during
#   development. This directory is already git-ignored (see .gitignore's
#   `docker/volumes/` entry from Phase 1) so no state ever gets committed.
# - Every credential has a "changeme_dev_only" fallback default ONLY so the
#   stack still runs if .env is missing; real usage should always supply
#   values via .env (see .env.example).
# - The `gateway` service (added in Phase 4) does not yet connect to
#   postgres/redis/qdrant/minio — there is no database/queue/vector-store
#   client code yet. It shares the network so that wiring can be added in
#   later phases without changing this service definition.
# - `docker/Dockerfile.agent` remains a stub, not yet referenced here — agent
#   containers are introduced starting Phase 7 (Task Queue & Orchestration
#   Framework).
# -----------------------------------------------------------------------------
